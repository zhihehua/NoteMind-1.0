<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- 引入 Matter.js 物理引擎 -->
    <script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js"></script>
    <style>
        /* 背景色与 dialog_bg.xml 保持一致 (#FFFBF0) */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #FFFBF0;
        }
        canvas { display: block; }
    </style>
</head>
<body>
<script>
    const { Engine, Render, Runner, Bodies, Composite, Mouse, MouseConstraint, Events, Body } = Matter;

    let engine, render, runner;
    let balls = [];
    let width = window.innerWidth;
    let height = window.innerHeight;

    function initPhysics() {
        engine = Engine.create();
        engine.gravity.y = 0;

        render = Render.create({
            element: document.body,
            engine: engine,
            options: {
                width: width,
                height: height,
                wireframes: false,
                background: '#FFFBF0',
                pixelRatio: window.devicePixelRatio
            }
        });

        Render.run(render);
        runner = Runner.create();
        Runner.run(runner, engine);

        // 边界墙
        const wallOptions = { isStatic: true, render: { visible: false } };
        Composite.add(engine.world, [
            Bodies.rectangle(width / 2, height + 50, width, 100, wallOptions),
            Bodies.rectangle(width / 2, -50, width, 100, wallOptions),
            Bodies.rectangle(-50, height / 2, 100, height, wallOptions),
            Bodies.rectangle(width + 50, height / 2, 100, height, wallOptions)
        ]);

        const mouse = Mouse.create(render.canvas);
        const mouseConstraint = MouseConstraint.create(engine, {
            mouse: mouse,
            constraint: { stiffness: 0.1, render: { visible: false } }
        });
        Composite.add(engine.world, mouseConstraint);

        // --- 核心交互优化：区分拖拽与点击 ---
        let startPos = { x: 0, y: 0 };
        let startTime = 0;

        Events.on(mouseConstraint, 'mousedown', function(event) {
            startPos = { x: event.mouse.position.x, y: event.mouse.position.y };
            startTime = Date.now();
        });

        Events.on(mouseConstraint, 'mouseup', function(event) {
            const endPos = event.mouse.position;
            const endTime = Date.now();

            // 计算位移和持续时间
            const dist = Math.sqrt(Math.pow(endPos.x - startPos.x, 2) + Math.pow(endPos.y - startPos.y, 2));
            const duration = endTime - startTime;

            // 判定标准：移动距离小于 10 像素 且 按住时间小于 250 毫秒 视为“点击”
            // 否则视为“拖拽”或“投掷”，不触发跳转
            if (dist < 10 && duration < 250) {
                const clickedBody = Matter.Query.point(balls, endPos)[0];
                if (clickedBody && window.AndroidBridge) {
                    window.AndroidBridge.openTagList(clickedBody.label);
                }
            }
        });

        // 标签绘制
        Events.on(render, 'afterRender', function() {
            const context = render.context;
            balls.forEach(ball => {
                const { x, y } = ball.position;
                const r = ball.circleRadius;

                // 绘制圆形背景
                context.beginPath();
                context.arc(x, y, r - 2, 0, 2 * Math.PI);
                context.fillStyle = "#00B4DB";
                context.fill();

                // 绘制文字
                context.font = `bold ${Math.max(10, r/3)}px sans-serif`;
                context.fillStyle = "#FFFFFF";
                context.textAlign = "center";
                context.textBaseline = "middle";
                context.fillText(ball.label, x, y);
            });
        });
    }

    function renderTags(tagJson) {
        const tagNames = JSON.parse(tagJson);
        const count = tagNames.length;

        // 动态大小逻辑
        let radius = 45;
        if (count > 10) radius = 35;
        if (count > 20) radius = 28;
        if (count > 40) radius = 22;

        balls.forEach(b => Composite.remove(engine.world, b));
        balls = [];

        tagNames.forEach((name) => {
            const ball = Bodies.circle(
                Math.random() * (width - 100) + 50,
                Math.random() * (height - 100) + 50,
                radius,
                {
                    restitution: 0.7, // 增加一点弹性，撞击更有力
                    frictionAir: 0.03, // 稍微降低阻力，让碰撞后的滚动更持久
                    label: name,
                    render: { visible: false }
                }
            );
            balls.push(ball);
        });

        Composite.add(engine.world, balls);
    }

    function updateSensorData(x, y, z) {
        if (!engine) return;
        const isFlat = Math.abs(x) < 2.5 && Math.abs(y) < 2.5;

        if (isFlat) {
            engine.gravity.x = 0;
            engine.gravity.y = 0;
            const center = { x: width / 2, y: height / 2 };
            balls.forEach(ball => {
                const deltaX = center.x - ball.position.x;
                const deltaY = center.y - ball.position.y;
                Body.applyForce(ball, ball.position, {
                    x: deltaX * 0.00005,
                    y: deltaY * 0.00005
                });
            });
        } else {
            engine.gravity.x = -x / 8;
            engine.gravity.y = y / 8;
        }
    }

    initPhysics();
</script>
</body>
</html>
